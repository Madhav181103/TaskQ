services:
  # 1. Express API backend
  - type: web
    name: taskq-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: taskq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskq-redis
          property: connectionString
      - key: CLIENT_URL
        value: https://taskq-frontend.onrender.com

  # 2. Worker process
  - type: worker
    name: taskq-worker
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: taskq-redis
          property: connectionString

  # 3. Redis Instance
  - type: redis
    name: taskq-redis
    plan: free
    ipAllowList: [] # Only allow internal connections within Render

  # 4. Frontend static site
  - type: web
    name: taskq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  # 5. Postgres Database
  - name: taskq-db
    plan: free
