services:
  # 1. Express API backend
  - type: web
    name: taskq-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLIENT_URL
        value: https://taskq-frontend.onrender.com
      - key: NODE_ENV
        value: production
      - key: MAX_RETRY_ATTEMPTS
        value: 3
      - key: RETRY_BACKOFF_BASE_SECONDS
        value: 2
      - key: WORKER_CONCURRENCY
        value: 3
      - key: PROCESSING_TIMEOUT_SECONDS
        value: 30

  # 2. Frontend static site
  - type: web
    name: taskq-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
